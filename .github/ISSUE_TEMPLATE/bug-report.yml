name: Bug Report
description: 报告影响回合制战斗原型验证的问题
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        请尽量提供可稳定复现的信息，便于快速定位并补回归测试。
  - type: dropdown
    id: affected_layer
    attributes:
      label: 问题分类
      description: 按用户可感知的问题类型选择，不需要判断技术实现层。
      options:
        - 玩法机制（例如：回合规则错误、目标选择异常、技能/道具行为错误）
        - 数值平衡（例如：伤害异常、消耗错误、强度明显失衡）
        - 系统流程（例如：进入战斗失败、无法结算返回、状态切换异常）
        - 输入交互（例如：键鼠/手柄映射错误、操作无响应、交互路径混乱）
        - 表现反馈（例如：镜头异常、动画/特效/音效不一致、HUD 可读性问题）
        - 稳定性与性能（例如：卡顿、掉帧、卡死、崩溃、异常中断）
        - 工具与流程（例如：调试面板异常、配置导入导出失败、测试/文档流程问题）
        - 暂不确定（先写复现现象，研发协助归类）
    validations:
      required: true
  - type: textarea
    id: reproduce_steps
    attributes:
      label: 复现步骤
      description: 用最短路径写出复现步骤；如果和输入有关，请写明键鼠或手柄。
      placeholder: |
        1. 打开 ...
        2. 执行 ...
        3. 观察 ...
    validations:
      required: true
  - type: textarea
    id: expected_result
    attributes:
      label: 预期结果
      placeholder: 应该发生什么
    validations:
      required: true
  - type: textarea
    id: actual_result
    attributes:
      label: 实际结果
      placeholder: 实际发生了什么（可附报错或异常表现）
    validations:
      required: true
  - type: input
    id: env_info
    attributes:
      label: 环境信息（可选）
      description: 例如分支/commit、浏览器版本、系统版本、设备类型。
      placeholder: main@abc123 / Chrome 124 / Windows 11 / Xbox 手柄
    validations:
      required: false
  - type: textarea
    id: logs_or_media
    attributes:
      label: 日志或截图（可选）
      description: 粘贴关键日志、报错栈或截图链接。
    validations:
      required: false
