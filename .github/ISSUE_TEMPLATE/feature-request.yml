name: Feature Request
description: 提交用于战斗 gameplay 原型验证的功能需求
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        请聚焦“原型验证价值”，描述清楚目标和验收标准，避免过早设计实现细节。
  - type: dropdown
    id: target_layer
    attributes:
      label: 需求分类
      description: 按需求要解决的问题类型选择，不需要判断技术实现落点。
      options:
        - 系统流程（例如：进入战斗、结算返回、状态切换）
        - 玩法机制（例如：回合规则、目标选择、技能/道具逻辑）
        - 数值平衡（例如：伤害、消耗、冷却、敌我强度）
        - 表现反馈（例如：镜头、动画、特效、音效、HUD 可读性）
        - 输入交互（例如：键鼠/手柄映射、操作手感、交互路径）
        - 稳定性与性能（例如：卡顿、掉帧、卡死、异常中断）
        - 工具与流程（例如：调试面板、配置导入导出、测试/文档流程）
        - 暂不确定（先描述现象与目标，研发协助归类）
    validations:
      required: true
  - type: textarea
    id: problem_statement
    attributes:
      label: 需求背景与目标
      description: 当前痛点是什么，这个需求要验证什么玩法假设。
      placeholder: |
        背景：
        目标：
        成功后可以回答的核心问题：
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 用可验证的结果描述完成定义（DoD）。
      placeholder: |
        - [ ] 场景 A 下可完成 ...
        - [ ] HUD/输入表现为 ...
        - [ ] 不影响现有 ... 回归项
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: 约束与非目标（可选）
      description: 例如事件驱动、UE 迁移一致性、单位规范（cm/cm/s/deg）等。
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案（可选）
      description: 如已考虑过其他方案，可简要写出取舍理由。
    validations:
      required: false
